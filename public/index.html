<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrokCord</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    .message { animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-zinc-900 text-white flex h-screen overflow-hidden">
  <!-- Sidebar комнат -->
  <div class="w-72 bg-zinc-800 flex flex-col">
    <div class="p-4 border-b border-zinc-700 flex items-center gap-2">
      <div class="text-2xl">🎙️</div>
      <h1 class="text-xl font-bold">GrokCord</h1>
    </div>
    <div class="p-3">
      <button onclick="showCreateModal()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2 rounded flex items-center justify-center gap-2">
        <span class="text-xl">+</span> Создать комнату
      </button>
    </div>
    <div class="px-3 text-xs uppercase tracking-widest text-zinc-400 mb-1">Комнаты</div>
    <div id="rooms-list" class="flex-1 overflow-auto px-2"></div>
  </div>

  <!-- Главная область -->
  <div class="flex-1 flex flex-col">
    <!-- Header -->
    <div id="header" class="h-14 bg-zinc-800 border-b border-zinc-700 px-4 flex items-center justify-between hidden">
      <div class="flex items-center gap-3">
        <span id="room-name" class="font-semibold text-lg"></span>
      </div>
      <div class="flex items-center gap-4">
        <div id="my-nickname" class="text-sm px-3 py-1 bg-zinc-700 rounded-full"></div>
        <button onclick="leaveRoom()" class="px-4 py-1 bg-red-600 hover:bg-red-500 rounded text-sm">Выйти из комнаты</button>
      </div>
    </div>

    <div class="flex-1 flex">
      <!-- Текстовый чат -->
      <div class="flex-1 flex flex-col">
        <div id="chat-messages" class="flex-1 p-4 overflow-auto space-y-4 bg-zinc-950"></div>
        <div class="p-4 border-t border-zinc-700 flex gap-2">
          <input id="message-input" type="text" placeholder="Напишите сообщение..." 
                 class="flex-1 bg-zinc-800 px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" 
                 onkeypress="if(event.key==='Enter') sendMessage()">
          <button onclick="sendMessage()" class="bg-emerald-600 hover:bg-emerald-500 px-8 rounded-xl">Отправить</button>
        </div>
      </div>

      <!-- Боковая панель участников -->
      <div class="w-72 bg-zinc-800 border-l border-zinc-700 flex flex-col">
        <div class="p-4 border-b border-zinc-700">
          <h2 class="uppercase text-xs tracking-widest text-zinc-400">Участники комнаты</h2>
          <div id="room-users" class="mt-3 space-y-1"></div>
        </div>
        
        <div class="p-4 flex-1 flex flex-col">
          <div class="flex items-center justify-between mb-3">
            <h2 class="uppercase text-xs tracking-widest text-zinc-400">Голосовой канал</h2>
            <button id="voice-btn" onclick="toggleVoice()" 
                    class="px-4 py-1 text-sm rounded-xl bg-emerald-600 hover:bg-emerald-500">Присоединиться к голосу</button>
          </div>
          
          <div id="voice-users" class="flex-1 space-y-2"></div>
          
          <div id="voice-controls" class="hidden mt-auto pt-4 border-t border-zinc-700 flex gap-3">
            <button onclick="toggleMute()" id="mute-btn"
                    class="flex-1 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl flex items-center justify-center gap-2">
              🔊 <span id="mute-text">Выключить микрофон</span>
            </button>
            <button onclick="leaveVoice()" class="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-2xl">Выйти из голоса</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно создания комнаты -->
  <div id="create-modal" onclick="if(event.target===this)hideCreateModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
    <div class="bg-zinc-800 rounded-3xl p-8 w-96">
      <h2 class="text-2xl font-bold mb-4">Создать новую комнату</h2>
      <input id="room-name-input" type="text" placeholder="Название комнаты" class="w-full bg-zinc-700 px-4 py-3 rounded-2xl outline-none mb-6">
      <div class="flex gap-3">
        <button onclick="hideCreateModal()" class="flex-1 py-3 text-zinc-400">Отмена</button>
        <button onclick="createRoom()" class="flex-1 py-3 bg-emerald-600 rounded-2xl">Создать</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
